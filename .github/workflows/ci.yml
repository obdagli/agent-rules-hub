name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify syntax
        run: |
          node --check dashboard/server.mjs
          node --check dashboard/static/app.js
          node --check dashboard/static/view-model.js
          node --check lib/hub-config.mjs
          node --check lib/instructions.mjs
          node --check lib/state.mjs
      - name: Run tests
        run: npm test
